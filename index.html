<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUD AI Launcher</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #00FF66;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        }

        body {
            /* Dimensiones exactas de la pantalla del lente */
            width: 600px;
            height: 600px;
            margin: 0 auto;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            border: 2px solid #00FF66;
        }

        header {
            text-align: center;
            border-bottom: 2px solid #00FF66;
            padding-bottom: 12px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
            flex: 1;
            padding: 20px 0;
        }

        .ai-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 140px;
            background: #002208;
            border: 2px solid #00FF66;
            color: #00FF66;
            text-decoration: none;
            font-size: 28px;
            font-weight: bold;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .ai-btn:active {
            background: #00FF66;
            color: #000000;
            transform: scale(0.98);
        }

        footer {
            text-align: center;
            font-size: 12px;
            opacity: 0.5;
            border-top: 1px solid #004411;
            padding-top: 8px;
        }
    </style>
</head>
<body>

    <header>
        <div class="title">HUD AI LAUNCHER</div>
        <div class="subtitle">SELECCIONA IA</div>
    </header>

    <div class="menu-container">
        <!-- Botón 1: Gemini -->
        <a href="https://gemini.google.com" target="_blank" class="ai-btn">
            🟢 GEMINI AI
        </a>

        <!-- Botón 2: ChatGPT -->
        <a href="https://chatgpt.com" target="_blank" class="ai-btn">
            🟢 CHATGPT
        </a>
    </div>

    <footer>
        DISPLAY RESOLUTION: 600x600 PX
    </footer>

</body>
</html>
