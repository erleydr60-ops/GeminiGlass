<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUD AI - Meta Display</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #00FF66;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            touch-action: manipulation; /* Evita delays de doble tap en visores */
        }

        body {
            width: 600px;
            height: 600px;
            margin: 0 auto;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 16px;
            border: 2px solid #00FF66;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00FF66;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .status {
            font-size: 12px;
        }

        .inputs-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        /* Estilos enfocados para resaltado visual al navegar con gestos */
        input {
            width: 100%;
            padding: 12px;
            background: #001100;
            border: 2px solid #00FF66;
            color: #00FF66;
            font-size: 16px;
            border-radius: 6px;
            outline: none;
        }

        input:focus {
            background: #003311;
            border-color: #FFFFFF;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        button {
            flex: 1;
            padding: 14px;
            background: #003311;
            border: 2px solid #00FF66;
            color: #00FF66;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            user-select: none;
        }

        button:focus, button:active {
            background: #00FF66;
            color: #000000;
        }

        #response-box {
            flex: 1;
            border: 2px solid #004411;
            border-radius: 6px;
            padding: 12px;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-word;
        }

        ::placeholder {
            color: #006622;
        }
    </style>
</head>
<body>

    <header>
        <span class="title">HUD AI SYSTEM</span>
        <span id="status-tag" class="status">READY</span>
    </header>

    <div class="inputs-container">
        <input type="password" id="api-key" placeholder="API Key..." tabindex="1" />
        <!-- Autofocus activo para entrar a escribir directo -->
        <input type="text" id="prompt-input" placeholder="Escribe consulta y presiona Enter..." tabindex="2" autofocus />
        
        <div class="btn-group">
            <button id="send-btn" onclick="sendQuery()" tabindex="3">Enviar</button>
            <button onclick="clearScreen()" style="background:#220000; border-color:#FF3333; color:#FF3333; flex:0.3;" tabindex="4">Borrar</button>
        </div>
    </div>

    <div id="response-box">
        Listo. Presiona Enter en el teclado para consultar.
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const savedKey = localStorage.getItem("gemini_api_key");
            if (savedKey) {
                document.getElementById("api-key").value = savedKey;
            }

            // Poner el cursor automáticamente en el campo de texto
            const promptInput = document.getElementById("prompt-input");
            promptInput.focus();

            // Detectar la tecla ENTER para enviar sin tener que tocar el botón
            promptInput.addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    sendQuery();
                }
            });
        });

        async function sendQuery() {
            const apiKeyInput = document.getElementById("api-key").value.trim();
            const promptInput = document.getElementById("prompt-input").value.trim();
            const outputBox = document.getElementById("response-box");
            const statusTag = document.getElementById("status-tag");

            if (!apiKeyInput) {
                outputBox.innerText = "Error: Falta ingresar la API Key.";
                return;
            }

            if (!promptInput) {
                outputBox.innerText = "Error: Escribe alguna consulta.";
                return;
            }

            localStorage.setItem("gemini_api_key", apiKeyInput);

            statusTag.innerText = "BUSCANDO...";
            outputBox.innerText = "Procesando...";

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKeyInput}`;

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptInput }] }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    outputBox.innerText = data.candidates[0].content.parts[0].text;
                    statusTag.innerText = "OK";
                } else if (data.error) {
                    outputBox.innerText = "Error API: " + data.error.message;
                    statusTag.innerText = "ERROR";
                }
            } catch (err) {
                outputBox.innerText = "Error de conexión: " + err.message;
                statusTag.innerText = "NET ERROR";
            } finally {
                document.getElementById("prompt-input").value = "";
            }
        }

        function clearScreen() {
            localStorage.removeItem("gemini_api_key");
            document.getElementById("api-key").value = "";
            document.getElementById("response-box").innerText = "Memoria borrada.";
            document.getElementById("status-tag").innerText = "READY";
        }
    </script>
</body>
</html>
