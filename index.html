<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUD AI GLASS FIXED</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #00FF66;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            touch-action: manipulation;
        }

        body {
            width: 600px;
            height: 600px;
            margin: 0 auto;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 14px;
            border: 2px solid #00FF66;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00FF66;
            padding-bottom: 6px;
            margin-bottom: 10px;
        }

        .title {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .status {
            font-size: 11px;
        }

        .inputs-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #001100;
            border: 2px solid #00FF66;
            color: #00FF66;
            font-size: 14px;
            border-radius: 6px;
            outline: none;
        }

        input:focus {
            background: #002208;
            border-color: #FFFFFF;
        }

        .btn-row {
            display: flex;
            gap: 8px;
        }

        button {
            flex: 1;
            padding: 12px;
            background: #003311;
            border: 2px solid #00FF66;
            color: #00FF66;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            outline: none;
        }

        button:focus, button:active {
            background: #00FF66 !important;
            color: #000000 !important;
            border-color: #FFFFFF !important;
        }

        #file-preview {
            font-size: 11px;
            color: #00FF66;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #response-box {
            flex: 1;
            border: 2px solid #004411;
            border-radius: 6px;
            padding: 10px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.3;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>

    <header>
        <span class="title">HUD AI VISION</span>
        <span id="status-tag" class="status">READY</span>
    </header>

    <div class="inputs-container">
        <!-- Input de texto con enfoque automático para los lentes -->
        <input type="text" id="prompt-input" placeholder="Escribe consulta y presiona Enter..." tabindex="1" autofocus />
        
        <div class="btn-row">
            <button onclick="document.getElementById('img-file').click()" tabindex="2">📷 ADJUNTAR FOTO</button>
            <input type="file" id="img-file" accept="image/*" style="display:none;" onchange="handleImage(event)" />
        </div>

        <div id="file-preview">Sin imagen adjunta.</div>

        <div class="btn-row">
            <button id="send-btn" onclick="sendQuery()" tabindex="3" style="background:#004411;">CONSULTAR</button>
        </div>
    </div>

    <div id="response-box">
        Sistema listo en los lentes. Escribe tu pregunta o sube una foto para analizar.
    </div>

    <script>
        // 👉 PEGA TU API KEY AQUÍ ENTRE LAS COMILLAS PARA QUE QUEDE FIJA EN LOS LENTES
        const FIXED_API_KEY = "AQ.Ab8RN6JpYmtt148-tgyD2hoio0i9i-TPKJJeCrkMivy__pu2dA";

        let selectedImageBase64 = null;

        document.addEventListener("DOMContentLoaded", () => {
            const promptInput = document.getElementById("prompt-input");
            promptInput.focus();

            promptInput.addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    sendQuery();
                }
            });
        });

        function handleImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById("file-preview").innerText = "Imagen: " + file.name;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64String = e.target.result.split(',')[1];
                selectedImageBase64 = {
                    inlineData: {
                        data: base64String,
                        mimeType: file.type
                    }
                };
            };
            reader.readAsDataURL(file);
        }

        async function sendQuery() {
            const promptInput = document.getElementById("prompt-input").value.trim();
            const outputBox = document.getElementById("response-box");
            const statusTag = document.getElementById("status-tag");

            if (!FIXED_API_KEY || FIXED_API_KEY === "TU_API_KEY_REAL_AQUI") {
                outputBox.innerText = "Error: Configura tu API Key fija dentro del código.";
                return;
            }

            if (!promptInput && !selectedImageBase64) {
                outputBox.innerText = "Error: Escribe algo o adjunta una imagen.";
                return;
            }

            statusTag.innerText = "PROCESANDO...";
            outputBox.innerText = "Analizando...";

            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-3.5-flash:generateContent?key=${FIXED_API_KEY}`;

            let partsArray = [];
            const textInstruction = "Responde breve y conciso para HUD: " + (promptInput || "Describe esta imagen:");
            partsArray.push({ text: textInstruction });

            if (selectedImageBase64) {
                partsArray.push(selectedImageBase64);
            }

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: partsArray }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    outputBox.innerText = data.candidates[0].content.parts[0].text;
                    statusTag.innerText = "OK";
                } else if (data.error) {
                    outputBox.innerText = "Error API: " + data.error.message;
                    statusTag.innerText = "ERROR";
                } else {
                    outputBox.innerText = "Sin respuesta.";
                    statusTag.innerText = "EMPTY";
                }
            } catch (err) {
                outputBox.innerText = "Error de red: " + err.message;
                statusTag.innerText = "NET ERROR";
            } finally {
                document.getElementById("prompt-input").value = "";
                selectedImageBase64 = null;
                document.getElementById("img-file").value = "";
                document.getElementById("file-preview").innerText = "Sin imagen adjunta.";
            }
        }
    </script>
</body>
</html>
