<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUD AI Launcher</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #00FF66;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            -webkit-tap-highlight-color: rgba(0, 255, 102, 0.4);
            user-select: none;
        }

        body {
            width: 600px;
            height: 600px;
            margin: 0 auto;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            border: 2px solid #00FF66;
        }

        header {
            text-align: center;
            border-bottom: 2px solid #00FF66;
            padding-bottom: 12px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
            justify-content: center;
            flex: 1;
            padding: 10px 0;
        }

        /* Botón optimizado para ser detectado por el motor de gestos */
        .ai-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 150px;
            background: #002208;
            border: 3px solid #00FF66;
            color: #00FF66;
            font-size: 30px;
            font-weight: bold;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            outline: none;
        }

        /* Resaltado cuando el gesto de los lentes apunta al botón */
        .ai-btn:focus, 
        .ai-btn:hover, 
        .ai-btn:active {
            background: #00FF66 !important;
            color: #000000 !important;
            border-color: #FFFFFF !important;
            box-shadow: 0 0 20px #00FF66;
        }

        footer {
            text-align: center;
            font-size: 12px;
            opacity: 0.6;
            border-top: 1px solid #004411;
            padding-top: 8px;
        }
    </style>
</head>
<body>

    <header>
        <div class="title">HUD AI LAUNCHER</div>
        <div class="subtitle">SELECCIONA IA</div>
    </header>

    <div class="menu-container">
        <!-- BOTÓN 1: GEMINI -->
        <div id="btn-gemini" 
             class="ai-btn" 
             role="button" 
             tabindex="1" 
             aria-label="Abrir Gemini">
            🟢 GEMINI AI
        </div>

        <!-- BOTÓN 2: CHATGPT -->
        <div id="btn-chatgpt" 
             class="ai-btn" 
             role="button" 
             tabindex="2" 
             aria-label="Abrir ChatGPT">
            🟢 CHATGPT
        </div>
    </div>

    <footer>
        DISPLAY RESOLUTION: 600x600 PX
    </footer>

    <script>
        function setupButton(elementId, targetUrl) {
            const btn = document.getElementById(elementId);

            function executeAction(e) {
                if (e) e.preventDefault();
                // Redirección directa en la misma ventana
                window.location.href = targetUrl;
            }

            // Escuchar todos los tipos de eventos posibles de gestos
            btn.addEventListener('click', executeAction);
            btn.addEventListener('pointerdown', executeAction);
            btn.addEventListener('touchstart', executeAction);

            // Escuchar confirmación por gesto de teclado/foco (Enter o Espacio)
            btn.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    executeAction(e);
                }
            });
        }

        // Configurar ambos botones
        setupButton('btn-gemini', 'https://gemini.google.com');
        setupButton('btn-chatgpt', 'https://chatgpt.com');
    </script>

</body>
</html>
