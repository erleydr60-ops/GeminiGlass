<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUD AI - Meta Display Launcher</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #00FF66;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            touch-action: manipulation;
            user-select: none;
        }

        body {
            width: 600px;
            height: 600px;
            margin: 0 auto;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            border: 2px solid #00FF66;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00FF66;
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .status {
            font-size: 12px;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
            flex: 1;
            padding: 10px 0;
        }

        /* Botones nativos mapeados para gestos */
        button {
            width: 100%;
            height: 180px;
            background: #002208;
            border: 3px solid #00FF66;
            color: #00FF66;
            font-size: 28px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
        }

        /* Resaltado visual para el cursor/foco del gesto en Meta */
        button:focus, button:active {
            background: #00FF66 !important;
            color: #000000 !important;
            border-color: #FFFFFF !important;
            box-shadow: 0 0 15px #00FF66;
        }

        #info-box {
            border: 2px solid #004411;
            border-radius: 6px;
            padding: 12px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <span class="title">HUD LAUNCHER</span>
        <span id="status-tag" class="status">READY</span>
    </header>

    <div class="menu-container">
        <!-- Botón 1 con TabIndex activo -->
        <button id="btn-1" tabindex="1" autofocus onclick="launchApp('app.html')">
            🟢 ABRIR GEMINI HUD
        </button>

        <!-- Botón 2 con TabIndex activo -->
        <button id="btn-2" tabindex="2" onclick="launchApp('https://chatgpt.com')">
            🟢 ABRIR CHATGPT
        </button>
    </div>

    <div id="info-box">
        Navega con gestos y presiona Seleccionar/Enter.
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Dar el foco automático al primer botón igual que hacías con el input
            const btn1 = document.getElementById("btn-1");
            const btn2 = document.getElementById("btn-2");
            btn1.focus();

            // Atrapar confirmación por tecla Enter/Gesto en el primer botón
            btn1.addEventListener("keydown", function(event) {
                if (event.key === "Enter" || event.key === " ") {
                    event.preventDefault();
                    launchApp('app.html');
                }
            });

            // Atrapar confirmación por tecla Enter/Gesto en el segundo botón
            btn2.addEventListener("keydown", function(event) {
                if (event.key === "Enter" || event.key === " ") {
                    event.preventDefault();
                    launchApp('https://chatgpt.com');
                }
            });
        });

        function launchApp(url) {
            document.getElementById("status-tag").innerText = "ABRIENDO...";
            window.location.href = url;
        }
    </script>
</body>
</html>
